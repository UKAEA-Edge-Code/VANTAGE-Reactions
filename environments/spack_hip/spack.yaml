# This is a Spack Environment file.
#
# MUST DO : Change amdgpu_target to be correct for your gpu
#
# Try here : https://rocm.docs.amd.com/projects/install-on-linux/en/latest/reference/system-requirements.html
#
# It describes the set of packages to be installed when developing
# NESO, along with configuration settings.
spack:
  # add package specs to the `specs` list
  specs:
  - vantage.vantagereactions+enable_tests build_type=Release ^neso.neso-particles ^neso.adaptivecpp compilationflow=hip amdgpu_target=gfx1201 ^googletest

  view: false
  concretizer:
    unify: false
  repos:
    vantage: ${PWD}/VANTAGE-repo
    neso: ${PWD}/NESO-Spack
  develop:
    vantagereactions:
      path: ${PWD}
      spec: vantagereactions@working
    neso-particles:
      path: ${PWD}/neso-particles
      spec: neso-particles@working
  packages:
    all:
      providers:
        sycl: [adaptivecpp]
