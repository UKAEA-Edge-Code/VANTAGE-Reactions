# This is a Spack Environment file.
#
# It describes the set of packages to be installed when developing
# NESO, along with configuration settings.
spack:
  # add package specs to the `specs` list
  specs:
    # If there is a failure due to adaptivecpp's guess of the architecture then add cuda_arch variant specifier after compilationflow=generic + cuda, eg. for sm90 the adaptivecpp portion of the spec would look like "^neso.adaptivecpp compilationflow=generic +cuda cuda_arch=90"
    - vantage.vantagereactions+enable_tests build_type=Debug ^neso-particles~build_tests ^neso.adaptivecpp compilationflow=generic +cuda cuda_arch=90 ^googletest

  view: false
  concretizer:
    unify: false
  repos:
    - ${PWD}/VANTAGE-repo
    - ${PWD}/NESO-Spack
  develop:
    vantagereactions:
      path: ${PWD}
      spec: vantagereactions@working
    neso-particles:
      path: ${PWD}/neso-particles
      spec: neso-particles@working
  packages:
    c:
      require:
        - gcc
    cxx:
      require:
        - gcc
    # un-comment the cuda requirement specifier and add the version number of the local compatible cuda version after the @
    # cuda:
    #   require:
    #     - "@"
    all:
      providers:
        sycl: [adaptivecpp]
